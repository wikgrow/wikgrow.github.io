  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .service-full-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
      margin-bottom: 24px;
      transition: all 0.3s;
    }
    .service-full-card:hover {
      box-shadow: var(--shadow-lg);
      border-color: var(--primary);
      transform: translateY(-3px);
    }
    .service-full-card.reverse { direction: rtl; }
    .service-full-card.reverse > * { direction: ltr; }
    .service-full-img {
      border-radius: var(--radius);
      width: 100%;
      height: 260px;
      object-fit: cover;
    }
    .service-full-content h2 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    .service-full-content p {
      font-size: 15px;
      color: var(--gray);
      line-height: 1.75;
      margin-bottom: 20px;
    }
    .feature-list {
      list-style: none;
      margin-bottom: 24px;
    }
    .feature-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--dark-3);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .feature-list li::before {
      content: '✓';
      width: 22px;
      height: 22px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .other-services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .other-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      transition: all 0.3s;
    }
    .other-card:hover {
      box-shadow: var(--shadow);
      border-color: var(--primary);
    }
    @media (max-width: 768px) {
      .service-full-card {
        grid-template-columns: 1fr;
        padding: 28px;
      }
      .service-full-card.reverse { direction: ltr; }
    }
  </style>
</head>
